<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AO Vault - Never lose your fanfiction again. Save, organize, and rediscover your favorite stories." />
    <title>AO Vault - Never Lose Your Fanfiction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Ko-fi Widget (will only show when you have a Ko-fi account) -->
    <script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
    <script>
      // Only initialize if on production site
      if (window.location.hostname === 'aovault.net' || window.location.hostname === 'www.aovault.net') {
        kofiWidgetOverlay.draw('aovault', {
          'type': 'floating-chat',
          'floating-chat.donateButton.text': 'Support',
          'floating-chat.donateButton.background-color': '#F59E0B',
          'floating-chat.donateButton.text-color': '#000000'
        });
      }
    </script>
  </body>
</html>
